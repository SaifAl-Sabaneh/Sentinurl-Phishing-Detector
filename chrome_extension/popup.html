<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinURL Extension</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🛡️ SentinURL</div>
            <div class="header-right">
                <div class="toggle-wrapper" title="Auto-Scan: Automatically scan every site you visit">
                    <span class="toggle-label" id="toggle-label">Auto</span>
                    <label class="switch">
                        <input type="checkbox" id="auto-scan-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="status-badge" id="status-badge">Scanning...</div>
            </div>
        </header>

        <section class="main-card" id="main-card">
            <h1 id="domain-name">Loading...</h1>
            <div class="risk-circle" id="risk-circle">
                <span id="risk-score">--%</span>
                <p>RISK</p>
            </div>
        </section>

        <section class="details">
            <h3>Engine Analysis</h3>
            <ul id="analysis-list">
                <li>Waiting for API response...</li>
            </ul>
            
            <div class="metrics">
                <div class="metric">
                    <span class="label">Stage 1 ML</span>
                    <span class="val" id="ml1-val">--</span>
                </div>
                <div class="metric">
                    <span class="label">Stage 2 ML</span>
                    <span class="val" id="ml2-val">--</span>
                </div>
            </div>
        </section>

        <footer>
            <div class="manual-scan">
                <input type="text" id="manual-url" placeholder="Paste link before visiting..." autocomplete="off">
                <button id="manual-scan-btn">Scan Link</button>
            </div>
            <button id="rescan-btn" class="secondary-btn">Scan Current Page</button>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
